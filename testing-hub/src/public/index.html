<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my-awesome-api · testing-hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #c0c0c0; padding: 32px; }
  a { color: inherit; }
  .svc { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
  .svc-dot { width: 10px; height: 10px; border-radius: 50%; background: #4ade80; }
  .svc-dot.red { background: #f87171; }
  .svc-dot.yellow { background: #facc15; }
  .svc-dot.blue { background: #60a5fa; }
  .svc-dot.purple { background: #a78bfa; }
  .svc-name { font-size: 18px; font-weight: 600; color: #eee; }
  .svc-tag { font-size: 10px; color: #666; border: 1px solid #222; padding: 1px 6px; }
  .svc-bar { display: flex; align-items: center; gap: 16px; font-size: 11px; color: #555; margin-bottom: 28px; flex-wrap: wrap; }
  .svc-bar span { display: flex; align-items: center; gap: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
  .status-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .status-item { border: 1px solid #1a1a1a; padding: 12px 16px; min-width: 130px; }
  .status-item .val { font-size: 22px; font-weight: 600; color: #eee; }
  .status-item .lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }
  h2 { font-size: 11px; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; margin-top: 32px; display: flex; align-items: center; gap: 8px; }
  h2 .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .desc { font-size: 12px; color: #555; margin-bottom: 14px; }
  .card { border: 1px solid #1a1a1a; padding: 14px 16px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .card-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .card-method { font-size: 10px; font-weight: 600; padding: 1px 5px; font-family: monospace; }
  .card-method.get { color: #4ade80; border: 1px solid #1a3a1a; }
  .card-method.post { color: #60a5fa; border: 1px solid #1a2a3a; }
  .card-path { font-family: monospace; font-size: 12px; color: #888; }
  .card-desc { font-size: 11px; color: #444; margin-top: 1px; }
  .card-url { font-family: monospace; font-size: 10px; color: #333; }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  button { background: transparent; border: 1px solid #222; color: #aaa; padding: 4px 12px; font-size: 11px; cursor: pointer; font-family: inherit; }
  button:hover { border-color: #444; color: #ddd; }
  button:disabled { opacity: 0.25; cursor: default; }
  button.sm { padding: 2px 8px; font-size: 10px; }
  button.green { border-color: #1a3a1a; color: #4ade80; }
  button.green:hover { border-color: #2a5a2a; }
  button.red { border-color: #3a1a1a; color: #f87171; }
  button.red:hover { border-color: #5a2a2a; }
  button.blue { border-color: #1a2a3a; color: #60a5fa; }
  button.blue:hover { border-color: #2a3a5a; }
  button.yellow { border-color: #3a3a1a; color: #facc15; }
  button.yellow:hover { border-color: #5a5a2a; }
  .result { font-size: 10px; font-family: monospace; color: #444; white-space: pre-wrap; margin-top: 6px; padding: 6px 0; }
  .result.ok { color: #4ade80; }
  .result.err { color: #f87171; }
  .section-group { margin-bottom: 8px; }
  .section-header { font-size: 10px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; padding: 0 2px; display: flex; align-items: center; gap: 6px; }
  .sdk-banner { border: 1px solid #1a1a1a; padding: 14px 16px; margin-top: 32px; font-size: 11px; color: #555; line-height: 1.8; }
  .sdk-banner strong { color: #888; }
  .sdk-banner code { color: #60a5fa; font-family: monospace; font-size: 10px; }
  .sdk-banner .key { color: #888; }
  .sdk-banner .val { color: #666; }
  .bad { color: #f87171; border-color: #3a1a1a; }
  .bad .svc-dot { background: #f87171; }
  .feed { border: 1px solid #1a1a1a; }
  .feed-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #1a1a1a; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
  .feed-count { color: #666; font-family: monospace; }
  .feed-list { max-height: 580px; overflow-y: auto; }
  .feed-item { padding: 8px 14px; border-bottom: 1px solid #111; font-size: 11px; display: flex; align-items: flex-start; gap: 8px; }
  .feed-item:last-child { border-bottom: none; }
  .feed-item:hover { background: #0d0d0d; }
  .feed-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
  .feed-label { font-weight: 500; color: #ccc; }
  .feed-label.fail { color: #f87171; }
  .feed-detail { font-size: 10px; color: #555; margin-top: 1px; }
  .feed-time { font-size: 9px; color: #333; margin-top: 1px; }
  .feed-empty { padding: 32px; text-align: center; font-size: 11px; color: #333; }
  .feed-actions { display: flex; gap: 4px; }
  .tag { display: inline-block; font-size: 9px; padding: 1px 5px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.3px; border: 1px solid #222; }
  .tag.error { color: #f87171; border-color: #3a1a1a; }
  .tag.analytics { color: #60a5fa; border-color: #1a2a3a; }
  .tag.deployment { color: #4ade80; border-color: #1a3a1a; }
  .tag.frustration { color: #facc15; border-color: #3a3a1a; }
  .tag.system { color: #888; border-color: #222; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
var SDK = { environmentKey: '--', apiKey: '--', endpoint: 'http://localhost:8080', ok: false, message: '' }

var CAT_COLORS = { error: '#f87171', analytics: '#60a5fa', deployment: '#4ade80', frustration: '#facc15', system: '#888' }
var CAT_TAGS = { error: 'tag error', analytics: 'tag analytics', deployment: 'tag deployment', frustration: 'tag frustration', system: 'tag system' }

function meta(key, fallback) {
  var el = document.getElementById(key)
  return el ? el.textContent : fallback
}

function card(method, path, desc, id, extraClass) {
  return '<div class="card">' +
    '<div class="card-left">' +
    '<span class="card-method ' + method.toLowerCase() + '">' + method + '</span>' +
    '<div>' +
    '<div class="card-path">' + path + '</div>' +
    '<div class="card-desc">' + desc + '</div>' +
    '<div class="result" id="r-' + id + '"></div>' +
    '</div></div>' +
    '<div class="card-actions"><button class="sm ' + (extraClass || '') + '" onclick="sendPost(\'' + path + '\',\'r-' + id + '\',this)">Send</button></div></div>'
}

function showResult(id, data, isErr) {
  var el = document.getElementById(id)
  if (!el) return
  el.className = 'result ' + (isErr ? 'err' : 'ok')
  var text = typeof data === 'string' ? data : JSON.stringify(data, null, 2)
  el.textContent = text.length > 300 ? text.slice(0, 300) + '...' : text
  if (!isErr) setTimeout(function() { el.textContent = ''; el.className = 'result' }, 4000)
}

function sendPost(url, resultId, btn) {
  btn.disabled = true
  showResult(resultId, 'sending...')
  fetch(url, { method: 'POST' }).then(function(r) {
    return r.json()
  }).then(function(d) {
    showResult(resultId, d)
    btn.disabled = false
  }).catch(function(e) {
    showResult(resultId, String(e), true)
    btn.disabled = false
  })
}

function renderFeed(events) {
  var html = ''
  if (!events || events.length === 0) {
    html = '<div class="feed-empty">No events yet — trigger something above</div>'
  } else {
    for (var i = 0; i < events.length; i++) {
      var e = events[i]
      var isErr = !e.ok
      html += '<div class="feed-item">' +
        '<span class="feed-dot" style="background:' + (CAT_COLORS[e.category] || '#888') + '"></span>' +
        '<div style="flex:1;min-width:0">' +
        '<div class="feed-label' + (isErr ? ' fail' : '') + '">' + e.label + '</div>' +
        '<div class="feed-detail">' + e.detail + '</div>' +
        '<div class="feed-time">' + new Date(e.ts).toLocaleTimeString() + ' <span class="' + (CAT_TAGS[e.category] || 'tag system') + '">' + e.category + '</span></div>' +
        '</div></div>'
    }
  }
  document.getElementById('feed-list').innerHTML = html
}

function fetchActivity() {
  fetch('/api/activity').then(function(r) { return r.json() }).then(function(d) {
    renderFeed(d.events)
  }).catch(function() {})
}

var activityInterval = setInterval(fetchActivity, 3000)

function init() {
  fetch('/api/health').then(function(r) {
    var apiOk = r.ok
    return fetch('/api/sdk-status').then(function(r2) { return r2.json() }).then(function(sdk) {
      SDK.ok = sdk.ok
      SDK.message = sdk.message
      render(apiOk)
    })
  }).catch(function() { render(false) })
}

function render(ok) {
  var sdkClass = SDK.ok ? 'SDK ok' : 'SDK misconfigured'
  var sdkColor = SDK.ok ? '#4ade80' : '#f87171'
  var ep = SDK.endpoint

  var html = ''
  html += '<div class="svc"><span class="svc-dot"></span><span class="svc-name">my-awesome-api</span><span class="svc-tag">testing-hub</span></div>'
  html += '<div class="svc-bar">'
  html += '<span>port ' + (location.port || 3001) + '</span>'
  html += '<span style="color:' + (ok ? '#4ade80' : '#f87171') + '">' + (ok ? 'connected' : 'offline') + '</span>'
  html += '<span style="color:' + sdkColor + '">' + sdkClass + '</span>'
  html += '<a href="/analytics" style="color:#60a5fa;text-decoration:none">Web SDK Test →</a>'
  html += '</div>'

  html += '<div class="status-row">'
  html += '<div class="status-item"><div class="val" id="val-uptime">-</div><div class="lbl">uptime</div></div>'
  html += '<div class="status-item"><div class="val" id="val-version">-</div><div class="lbl">version</div></div>'
  html += '<div class="status-item"><div class="val" id="val-env">-</div><div class="lbl">environment</div></div>'
  html += '</div>'

  html += '<div class="grid">'
  html += '<div>'

  // ── Monitors ──
  html += '<h2><span class="dot" style="background:#4ade80"></span>Monitor Endpoints</h2>'
  html += '<p class="desc">Create Sonar monitors pointing at these URLs to track uptime, latency, error rates.</p>'
  html += card('GET', '/api/health', 'Always 200. Baseline healthy endpoint.', 'health')
  html += card('GET', '/api/slow', 'Responds after 1-4s. Tests latency tracking.', 'slow')
  html += card('GET', '/api/flaky', '200 ~60% / 500 ~40%. Tests state transitions.', 'flaky')
  html += card('GET', '/api/error', 'Always 500. Tests down monitor state.', 'error')
  html += card('GET', '/api/version', 'Service metadata (version, node, uptime).', 'version')

  // ── Errors ──
  html += '<h2><span class="dot" style="background:#f87171"></span>Error Triggers</h2>'
  html += '<p class="desc">Fire errors through the SDK — they show up on the Errors dashboard.</p>'
  html += card('POST', '/trigger/error', 'Single error via SDK.', 'trigger-error')
  html += card('POST', '/trigger/errors/batch', '3 errors with different fingerprints.', 'trigger-batch')
  html += card('POST', '/trigger/errors/with-stack', 'Deeply nested function stack trace.', 'trigger-stack')
  html += card('POST', '/trigger/rejection', 'Simulated unhandled promise rejection.', 'trigger-rejection')

  // ── Analytics ──
  html += '<h2><span class="dot" style="background:#60a5fa"></span>Analytics Triggers (server-side)</h2>'
  html += '<p class="desc">Fire analytics events directly from the server. Shows up on the Analytics dashboard.</p>'
  html += card('POST', '/trigger/analytics', 'Custom analytics event.', 'trigger-analytics')
  html += card('POST', '/trigger/analytics/page-view', 'Page view event with metadata.', 'trigger-pv')
  html += card('POST', '/trigger/analytics/click', 'Button click event (severity 0.6).', 'trigger-click')
  html += card('POST', '/trigger/analytics/scroll', 'Scroll depth event (severity 0.4).', 'trigger-scroll')
  html += card('POST', '/trigger/analytics/form-submit', 'Form submission event (severity 0.7).', 'trigger-form')
  html += card('POST', '/trigger/analytics/console-error', 'Console error event (severity 0.9).', 'trigger-console')

  // ── Frustration ──
  html += '<h2><span class="dot" style="background:#facc15"></span>Frustration Signals</h2>'
  html += '<p class="desc">Simulate user frustration. Each fires an analytics event at severity 0.85.</p>'
  html += card('POST', '/trigger/frustration/rage-click', '5 quick clicks on same element.', 'trigger-rage')
  html += card('POST', '/trigger/frustration/dead-click', 'Click with no DOM mutation.', 'trigger-dead')
  html += card('POST', '/trigger/frustration/hesitation', 'Long hover with no interaction.', 'trigger-hes')
  html += card('POST', '/trigger/frustration/scroll-chaos', 'Rapid scroll direction changes.', 'trigger-scroll-chaos')
  html += card('POST', '/trigger/frustration/cascade', 'Multiple signal types in short window.', 'trigger-cascade')

  // ── Deployments ──
  html += '<h2><span class="dot" style="background:#4ade80"></span>Deployment Triggers</h2>'
  html += '<p class="desc">Record deployment events via the SDK.</p>'
  html += card('POST', '/trigger/deploy', 'Successful deployment.', 'trigger-deploy', 'green')
  html += card('POST', '/trigger/deploy/fail', 'Failed deployment.', 'trigger-deploy-fail', 'green')

  // ── Sessions ──
  html += '<h2><span class="dot" style="background:#a78bfa"></span>Session Triggers</h2>'
  html += '<p class="desc">Create analytics sessions with page views.</p>'
  html += card('POST', '/trigger/session/start', 'New session + visitor + page view.', 'trigger-session')

  // ── Status Pages ──
  html += '<h2><span class="dot" style="background:#888"></span>Status Page Triggers</h2>'
  html += '<p class="desc">Manage Sonar status pages via GraphQL. Requires <code>workspaceId</code> from dashboard URL.</p>'
  html += card('POST', '/trigger/status-page?workspaceId=ws_xxx&name=Testing+Hub+Status', 'Create from query params.', 'trigger-sp-create')
  html += card('POST', '/trigger/status-page/add-service?statusPageId=sp_xxx&serviceId=svc_health', 'Link service to status page.', 'trigger-sp-add')
  html += card('POST', '/trigger/status-page/delete?id=sp_xxx', 'Delete a status page.', 'trigger-sp-delete')

  // ── SDK Config ──
  html += '<h2><span class="dot" style="background:#888"></span>SDK Configuration</h2>'
  html += '<div class="sdk-banner">'
  html += '<strong>@sonar/sdk</strong> <code>packages/sdk</code><br><br>'
  html += '<span class="key">SONAR_ENDPOINT</span> <span class="val">' + SDK.endpoint + '</span><br>'
  html += '<span class="key">SONAR_ENVIRONMENT_KEY</span> <span class="val">' + SDK.environmentKey + '</span><br>'
  html += '<span class="key">SONAR_API_KEY</span> <span class="val">' + SDK.apiKey + '</span><br><br>'
  html += SDK.ok
    ? '<span style="color:#4ade80">SDK configured and ready</span>'
    : '<span style="color:#f87171">' + SDK.message + '</span>'
  html += '</div>'

  html += '</div>' // end left

  // ── Right: Activity Feed ──
  html += '<div>'
  html += '<div class="feed">'
  html += '<div class="feed-header"><span><span id="feed-count">0</span> events</span><div class="feed-actions"><button class="sm" onclick="fetchActivity()">Refresh</button><button class="sm" onclick="fetch(\'/api/activity\',{method:\'DELETE\'}).then(fetchActivity)">Clear</button></div></div>'
  html += '<div class="feed-list" id="feed-list"><div class="feed-empty">Loading...</div></div>'
  html += '</div>'
  html += '<p style="font-size:10px;color:#333;margin-top:8px">Auto-refreshes every 3s · <a href="#" onclick="clearInterval(activityInterval);activityInterval=setInterval(fetchActivity,3000);return false" style="color:#555">reset</a></p>'
  html += '</div>' // end right

  html += '</div>' // end grid

  document.getElementById('app').innerHTML = html
  fetchActivity()

  // Populate status values
  fetch('/api/health').then(function(r) { return r.json() }).then(function(d) {
    var el = document.getElementById('val-uptime')
    if (el) el.textContent = d.uptime ? Math.floor(d.uptime / 1000) + 's' : '-'
  }).catch(function() {})
  fetch('/api/version').then(function(r) { return r.json() }).then(function(d) {
    var el = document.getElementById('val-version')
    if (el) el.textContent = d.version || '-'
    SDK.environmentKey = d.environmentKey || SDK.environmentKey
    SDK.apiKey = d.apiKeyPrefix || SDK.apiKey
  }).catch(function() {})
}

fetch('/api/version').then(function(r) { return r.json() }).then(function(d) {
  SDK.environmentKey = d.environmentKey || SDK.environmentKey
}).catch(function() {})
init()
</script>
</body>
</html>
