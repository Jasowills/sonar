<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="48x48" href="/favicon-48.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="Sonar — uptime monitoring, error tracing, and incident response for SaaS teams." />
    <meta property="og:site_name" content="Sonar" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Sonar — observability for SaaS teams</title>
    <script>
      // Dark-mode first: only drop the dark class if the user explicitly chose light.
      try {
        if (localStorage.getItem('sonar-theme') === 'light') {
          document.documentElement.classList.remove('dark')
        }
      } catch (e) {
        /* keep the dark default */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
